# ============================================================================
# TradeOffStackAPI — Docker Compose (Production-Ready)
# ============================================================================
# Usage:
#   Développement : docker compose up -d --build
#   L'API sera disponible sur : http://localhost:5000
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Variable POSTGRES_PASSWORD requise}
      POSTGRES_DB: ${POSTGRES_DB:-tradeoffstack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-tradeoffstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:8080"
    volumes:
      - uploads:/app/wwwroot/uploads
    environment:
      # Injection de la chaîne de connexion (écrase le appsettings.json)
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Port=5432;
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ASPNETCORE_ENVIRONMENT=Development

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
